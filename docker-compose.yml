services:
  uniocr:
    image: ghcr.io/yuanweize/uni-ocr:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uniocr
    ports:
      # Bind to loopback by default so the API isn't reachable from the LAN/internet
      # out of the box. Override UNIOCR_BIND_HOST (e.g. to your Tailscale IP or
      # 0.0.0.0) if you deliberately want it exposed more broadly.
      - "${UNIOCR_BIND_HOST:-127.0.0.1}:${UNIOCR_PORT:-8000}:8000"
    environment:
      - UNIOCR_MLX_VLM_URL=${UNIOCR_MLX_VLM_URL:-}
      - UNIOCR_MLX_VLM_MODEL=${UNIOCR_MLX_VLM_MODEL:-PaddlePaddle/PaddleOCR-VL-1.6}
      # auto | cpu | gpu | gpu:N. "auto" is a no-op unless the image was built
      # with a paddlepaddle-gpu PADDLE_PACKAGE — see the Dockerfile.
      - UNIOCR_DEVICE=${UNIOCR_DEVICE:-auto}
    volumes:
      - model-cache:/home/uniocr/.paddlex
      - ocr-data:/app/data
    restart: unless-stopped
    # Runs as the non-root "uniocr" user baked into the image (see Dockerfile);
    # these drop the extra privileges Docker grants containers by default.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: ${UNIOCR_MEM_LIMIT:-4g}
    cpus: ${UNIOCR_CPU_LIMIT:-2}
    pids_limit: 512
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  model-cache:
    driver: local
  # Persists the SQLite DB (admin credentials, API keys, JWT secret) across restarts.
  ocr-data:
    driver: local
